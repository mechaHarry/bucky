# GitHub automatically generated release notes configuration.
# See: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - skip-changelog
      - no-changelog
      - duplicate
      - invalid
      - question
      - wontfix
    authors:
      - github-actions[bot]
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - semver-major
        - Semver-Major
    - title: Features
      labels:
        - feature
        - enhancement
        - semver-minor
        - Semver-Minor
    - title: Fixes
      labels:
        - bug
        - bugfix
        - fix
    - title: UI and Polish
      labels:
        - ui
        - ux
        - design
        - polish
        - liquid-glass
        - macos
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Tests
      labels:
        - test
        - tests
        - testing
    - title: Dependencies
      labels:
        - dependencies
        - dependency
    - title: Other Changes
      labels:
        - "*"
